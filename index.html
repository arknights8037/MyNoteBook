<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f1604c'/%3E%3Cpath d='M10 8h9.5L23 11.5V24H10z' fill='white'/%3E%3Cpath d='M19.5 8v3.5H23' fill='%23ffd7cf'/%3E%3Cpath d='M13 15h7M13 18h6M13 21h5' stroke='%23f1604c' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <title>myNoteBook</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #fbfbfa;
      }

      :root[data-theme-mode='dark'] body {
        background: #202124;
      }

      .startup-shell {
        display: grid;
        grid-template-columns: 274px minmax(0, 1fr);
        width: 100%;
        height: 100%;
        color: #373733;
        background: #fbfbfa;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
      }

      :root[data-theme-mode='dark'] .startup-shell {
        color: #e5e5e2;
        background: #202124;
      }

      .startup-shell__sidebar {
        padding: 26px 20px;
        border-right: 1px solid #e8e7e3;
        background: #f5f5f3;
      }

      :root[data-theme-mode='dark'] .startup-shell__sidebar {
        border-color: #34363a;
        background: #292a2d;
      }

      .startup-shell__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
      }

      .startup-shell__logo {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: #f1604c;
        box-shadow: inset 0 0 0 5px #ffffff;
      }

      .startup-shell__nav-lines,
      .startup-shell__document {
        display: grid;
        gap: 14px;
        margin-top: 42px;
      }

      .startup-shell__nav-lines span,
      .startup-shell__document span,
      .startup-shell__toolbar {
        display: block;
        height: 10px;
        border-radius: 3px;
        background: #e2e2de;
        animation: startup-pulse 1.4s ease-in-out infinite alternate;
      }

      :root[data-theme-mode='dark'] .startup-shell__nav-lines span,
      :root[data-theme-mode='dark'] .startup-shell__document span,
      :root[data-theme-mode='dark'] .startup-shell__toolbar {
        background: #3c3e42;
      }

      .startup-shell__nav-lines span:nth-child(1) {
        width: 72%;
      }
      .startup-shell__nav-lines span:nth-child(2) {
        width: 88%;
      }
      .startup-shell__nav-lines span:nth-child(3) {
        width: 64%;
      }
      .startup-shell__nav-lines span:nth-child(4) {
        width: 78%;
      }

      .startup-shell__content {
        position: relative;
        min-width: 0;
        padding: 24px 34px;
      }

      .startup-shell__toolbar {
        width: 38%;
        max-width: 360px;
      }

      .startup-shell__document {
        width: min(760px, 78%);
        margin: 150px auto 0;
      }

      .startup-shell__document .startup-shell__title {
        width: 64%;
        height: 30px;
        margin-bottom: 18px;
      }

      .startup-shell__document span:nth-child(2) {
        width: 96%;
      }
      .startup-shell__document span:nth-child(3) {
        width: 84%;
      }
      .startup-shell__document span:nth-child(4) {
        width: 70%;
      }

      .startup-shell__status {
        position: absolute;
        right: 34px;
        bottom: 34px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #575752;
      }

      :root[data-theme-mode='dark'] .startup-shell__status {
        color: #d4d4d0;
      }

      .startup-shell__status > span:last-child {
        display: grid;
        gap: 2px;
      }

      .startup-shell__status strong {
        font-size: 13px;
        font-weight: 650;
      }

      .startup-shell__status small {
        color: #92928d;
        font-size: 11px;
      }

      .startup-shell__spinner {
        position: relative;
        width: 30px;
        height: 30px;
        animation: startup-spin 1.8s linear infinite;
      }

      .startup-shell__spinner i {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f1604c;
      }

      .startup-shell__spinner i:nth-child(1) {
        top: 0;
        left: 11px;
      }

      .startup-shell__spinner i:nth-child(2) {
        right: 1px;
        bottom: 4px;
        opacity: 0.65;
      }

      .startup-shell__spinner i:nth-child(3) {
        bottom: 4px;
        left: 1px;
        opacity: 0.35;
      }

      .startup-shell__progress {
        position: absolute;
        right: 34px;
        bottom: 20px;
        width: 180px;
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: #e2e2de;
      }

      :root[data-theme-mode='dark'] .startup-shell__progress {
        background: #3c3e42;
      }

      .startup-shell__progress i {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #f1604c;
        animation: startup-progress 1.45s ease-in-out infinite;
      }

      @keyframes startup-pulse {
        from {
          opacity: 0.5;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes startup-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes startup-progress {
        from {
          transform: translateX(-110%);
        }
        to {
          transform: translateX(350%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-shell__nav-lines span,
        .startup-shell__document span,
        .startup-shell__toolbar {
          animation: none;
        }

        .startup-shell__spinner,
        .startup-shell__progress i {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <script>
      ;(() => {
        const themes = {
          'paper-light': 'light',
          'clay-light': 'light',
          'nord-dark': 'dark',
          'graphite-dark': 'dark',
        }
        const normalizePreference = (value) => {
          if (value === 'light') return 'paper-light'
          if (value === 'dark') return 'graphite-dark'
          return value === 'system' || themes[value] ? value : 'system'
        }
        try {
          const settings = JSON.parse(localStorage.getItem('my-notebook:settings') || '{}')
          const preference = normalizePreference(settings.theme)
          const systemDark = matchMedia?.('(prefers-color-scheme: dark)').matches
          const theme =
            preference === 'system' ? (systemDark ? 'graphite-dark' : 'paper-light') : preference
          const mode = themes[theme] || 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.dataset.themePreference = preference
          document.documentElement.dataset.themeMode = mode
          document.documentElement.style.colorScheme = mode
        } catch {
          document.documentElement.dataset.theme = 'paper-light'
          document.documentElement.dataset.themePreference = 'system'
          document.documentElement.dataset.themeMode = 'light'
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
    <div id="app">
      <main class="startup-shell" aria-label="正在启动">
        <aside class="startup-shell__sidebar">
          <div class="startup-shell__brand">
            <span class="startup-shell__logo" aria-hidden="true"></span>
            <strong>myNoteBook</strong>
          </div>
          <div class="startup-shell__nav-lines" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </aside>
        <section class="startup-shell__content">
          <div class="startup-shell__toolbar" aria-hidden="true"></div>
          <div class="startup-shell__document" aria-hidden="true">
            <span class="startup-shell__title"></span>
            <span></span><span></span><span></span>
          </div>
          <div class="startup-shell__status" role="status" aria-live="polite">
            <span class="startup-shell__spinner" aria-hidden="true"><i></i><i></i><i></i></span>
            <span>
              <strong>正在打开知识库</strong>
              <small>准备本地文档与编辑器</small>
            </span>
          </div>
          <span class="startup-shell__progress" aria-hidden="true"><i></i></span>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
